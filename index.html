<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página en Construcción | CASTDIM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    font-family: 'Montserrat', sans-serif;
    padding: 32px;
  }

  .container {
    text-align: center;
    max-width: 480px;
  }

  .logo {
    width: 100%;
    max-width: 340px;
    height: auto;
    margin-bottom: 40px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #fecb47;
    margin: 0 auto 28px;
    border-radius: 2px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(24px, 5vw, 34px);
    color: #3a3836;
    letter-spacing: 0.3px;
  }

  p {
    margin-top: 12px;
    font-size: 14px;
    color: #797673;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

  <div class="container">
    <img class="logo" src="images/logo-un-proyecto-de-castdim.png" alt="Un Proyecto de CASTDIM">
    <div class="divider"></div>
    <h1>Página en Construcción</h1>
    <p>Muy pronto estará disponible</p>
  </div>

</body>
</html>
